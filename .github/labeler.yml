# Configuration for the auto-labeler workflow.
# Maps labels to file glob patterns.

integration:
  - changed-files:
      - any-glob-to-any-file: "custom_components/telink_manager/**"

frontend:
  - changed-files:
      - any-glob-to-any-file: "custom_components/telink_manager/www/**"

tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "images/**"
          - "LICENSE"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

translations:
  - changed-files:
      - any-glob-to-any-file: "custom_components/telink_manager/translations/**"

config-flow:
  - changed-files:
      - any-glob-to-any-file:
          - "custom_components/telink_manager/config_flow.py"
          - "custom_components/telink_manager/strings.json"
